<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayal's Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 30px;
            background: rgba(255, 192, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        /* 🔥 עיצוב הקישורים/כפתורים החדש 🔥 */
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            
            /* שינוי צבע הטקסט והרקע */
            color: #1e3c72;            /* צבע הטקסט בתוך הכפתור (כחול כהה) */
            background-color: #ffffff; /* צבע הרקע של הכפתור (לבן) */
            
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;     /* מוריד את הקו התחתון האוטומטי של הקישור */
            border-radius: 25px;       /* פינות עגולות */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease; /* אנימציה חלקה במעבר עכבר */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Ayal's amazing page</h1>
        <p>Powered by Drogon C++ Web Framework 🚀</p>
        <a href="/users" class="btn">View Database Content ➡️</a></p>
        <a href="/users_roles" class="btn">View users with roles ➡️</a></p>
        <a href="/ai_usage.html" class="btn">Call AI Project➡️</a>
    </div>
</body>
</html>
